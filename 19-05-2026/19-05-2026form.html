<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>

    <style>
  /* Core Reset & Peaceful Forest Vibe */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #1b3322; /* Deep moss green */
    background-image: radial-gradient(circle at center, #2d5238 0%, #112216 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

/* The Cozy Hobbit-Hole Door Window */
form {
    background-color: #fcf8f2; /* Soft warm parchment */
    width: 100%;
    max-width: 450px;
    padding: 40px;
    
    /* Elegant leaf-like rounded shapes */
    border-radius: 40px 10px 40px 10px;
    border: 3px solid #8c6239; /* Polished oak wood border */
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

/* Elven Script Title */
h1 {
    font-family: 'Cinzel', 'Georgia', serif;
    color: #2d5238; /* Forest green lettering */
    font-size: 26px;
    font-weight: 500;
    text-align: center;
    margin-bottom: 25px;
    letter-spacing: 1px;
    border-bottom: 2px solid #e6ceac; /* Gold ribbon line */
    padding-bottom: 12px;
}

/* Natural Stack Layout */
div {
    display: flex;
    flex-direction: column;
}

/* Soft Meadow Labels */
label {
    font-family: 'Georgia', serif;
    color: #5c4033; /* Dark earthy wood brown */
    font-size: 14px;
    font-style: italic;
    margin-bottom: 6px;
    margin-top: 16px;
}

/* Hand-Crafted Letter Inputs */
input[type="text"],
input[type="email"],
input[type="date"],
input[type="number"] {
    width: 100%;
    padding: 12px;
    font-family: 'Georgia', serif;
    font-size: 14px;
    color: #332211;
    background-color: #ffffff;
    border: 1px solid #d4c5b3; /* Soft stone gray */
    border-radius: 8px; /* Smooth rounded edges */
    outline: none;
    transition: all 0.3s ease;
}

/* Golden Sunbeam Focus State */
input:focus {
    border-color: #bfa15f; /* Warm elven gold */
    background-color: #fffdfa;
    box-shadow: 0 0 8px rgba(191, 161, 95, 0.4);
}

/* Warm Oak Submit Button */
button[type="submit"] {
    font-family: 'Cinzel', 'Georgia', serif;
    background-color: #2d5238; /* Peaceful forest green */
    color: #ffffff;
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 2px;
    padding: 14px;
    margin-top: 30px;
    border: none;
    border-radius: 25px; /* Fully rounded elegant button */
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(45, 82, 56, 0.3);
    transition: all 0.2s ease;
}

/* Button Hover State */
button[type="submit"]:hover {
    background-color: #223f2b; /* Deeper shade of moss */
    box-shadow: 0 6px 15px rgba(45, 82, 56, 0.4);
}


    </style>
</head>
<body>
    <form  action="" method="post">
        <h1>New Form</h1>
        <div>
            <label for="username">Enter your username: </label>
            <input type="text" name="username" placeholder="Username">
            <br>
            <label for="email">Enter your email: </label>
            <input type="email" name="email" placeholder="Email" required>
            <br>
            <label for="dob">Enter your DOB: </label>
            <input type="date" name="dob">
            <br>
            <label for="number">Enter your Number: </label>
            <input type="number" name="number" placeholder="Number" required>
            <br>
            <label for="name">Enter your name: </label>
            <input type="text" name="name" placeholder="Name">
            <br>
            <button type="submit">Submit</button>
        </div>
    </form>
</body>
</html>
