<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart</title>
    <link rel="stylesheet" href="flipkart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="main-container">
        <div class="container">
            <div class="navbar-container">
                <div class="left-nav-content">
                    
                    <button class="flipkart-btn"><img>Flipkart</button>
                    <button class="travel-btn"><img>Travel</button>
                </div>
                <div class="right-nav-content">
                    <p>Location not set</p>
                    <li>Select delivery option</li>
                </div>
            </div>
            <div class="mainbody">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder=" Search for Products, Brands and More">
                </div>
                <div class="right-search-bar">
                    
                    <button class="login"><i class="fa-regular fa-circle-user"></i>Login</button>
                    <button class="more">More</button>
                    <button class="cart"><i class="fa-solid fa-cart-shopping"></i>Cart</button>
                </div>
               
        </div>
                 <div class="main-navbar">
                    <div class="main-nav">
                        <div>For You</div>
                        <div>Fashion</div>
                        <div>Mobile</div>
                    </div>
                </div>
                <div class="three-cards-container">
                    <div class="cards">
                        <img src="https://rukminim2.flixcart.com/fk-p-flap/2000/980/image/f2a125cd24b562d9.jpg?q=60">
                    </div>
                     <div class="cards">
                        <img src="https://rukminim2.flixcart.com/fk-p-flap/2000/980/image/f2a125cd24b562d9.jpg?q=60">
                    </div>
                     <div class="cards">
                        <img src="https://rukminim2.flixcart.com/fk-p-flap/2000/980/image/f2a125cd24b562d9.jpg?q=60">
                    </div>
                </div>
                <div class="">

                </div>

            
        </div>
    </div>
   
</body>
</html>
