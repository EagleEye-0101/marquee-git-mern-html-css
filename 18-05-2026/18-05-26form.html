<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Forms</title>
</head>
<body>
    <div>
        <h1>Student Data Collection</h1>
        <form action="" method="post">
            <label for="username">Enter your name:</label>
            <input type="text" name="username" placeholder="Kali">
            <br>
            <label for="email">Enter your Email:</label>
            <input type="email" name="email" placeholder="hi@gmail.com">
            <br>
            <label for="dob">Enter your DOB:</label>
            <input type="date" name="dob" placeholder="Date Of Birth">
            <br>
            <label for="password">Enter your password:</label>
            <input type="password" name="password" placeholder="123Kali@#$%" >
            <br>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
